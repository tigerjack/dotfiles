# Format: config_file_name:sed_pattern:light_value:dark_value
## These are mostly GUI config files, or pure themes; no needed to track the exact configuration, just the template is fine
# GTK
gtk2theme:$HOME/.gtkrc-2.0.@theme:^gtk-theme-name=:\"Arc\":\"Arc-Dark\"
gtk2icons:$HOME/.gtkrc-2.0.@theme:^gtk-icon-theme-name=:\"Arc\":\"Arc-Dark\"
gtk3theme:$XDG_CONFIG_HOME/gtk-3.0/settings.ini.@theme:^gtk-theme-name=:\"Arc\":\"Arc-Dark\"
gtk3icons:$XDG_CONFIG_HOME/gtk-3.0/settings.ini.@theme:^gtk-icon-theme-name=:\"Arc\":\"Arc-Dark\"
gtk3prefs:$XDG_CONFIG_HOME/gtk-3.0/settings.ini.@theme:^gtk-application-prefer-dark-theme=:false:true
gtk4theme:$XDG_CONFIG_HOME/gtk-4.0/settings.ini.@theme:^gtk-theme-name=:\"Arc\":\"Arc-Dark\"
gtk4icons:$XDG_CONFIG_HOME/gtk-4.0/settings.ini.@theme:^gtk-icon-theme-name=:\"Arc\":\"Arc-Dark\"
gtk4prefs:$XDG_CONFIG_HOME/gtk-4.0/settings.ini.@theme:^gtk-application-prefer-dark-theme=:false:true
# QT6
qt6colors:$XDG_CONFIG_HOME/qt6ct/qt6ct.conf.@theme:^color_scheme_path=:/usr/share/qt6ct/colors/simple.conf:/usr/share/qt6ct/colors/darker.conf
qt6icons:$XDG_CONFIG_HOME/qt6ct/qt6ct.conf.@theme:^icon_theme=:breeze:breeze-dark
qt6style:$XDG_CONFIG_HOME/qt6ct/qt6ct.conf.@theme:^style=:kvantum:kvantum-dark
# QT5
qt5colors:$XDG_CONFIG_HOME/qt5ct/qt5ct.conf.@theme:^color_scheme_path=:/usr/share/qt5ct/colors/simple.conf:/usr/share/qt5ct/colors/darker.conf
qt5icons:$XDG_CONFIG_HOME/qt5ct/qt5ct.conf.@theme:^icon_theme=:breeze:breeze-dark
qt5style:$XDG_CONFIG_HOME/qt5ct/qt5ct.conf.@theme:^style=:kvantum:kvantum-dark
# SpeedCrunch
speedcrunch:$XDG_CONFIG_HOME/SpeedCrunch/SpeedCrunch.ini.@theme:ColorSchemeName=:Solarized Light:Solarized Dark
# Zathura
zathura:$XDG_CONFIG_HOME/zathura/zathurarc.@theme:set recolor :false:true

## config files containing also theme configrations, tracked (whenever possible) separately
# Vim
vim:$XDG_CONFIG_HOME/vim/local-theme.vim.@theme:^set background=:light:dark
# Spacemacs
# NOTE: targets local-themes.el (untracked, gitignored), NOT init.el.
# init.el just does: (load (expand-file-name "local-themes.el" ...) t)
# so switching themes never dirties the tracked spacemacs config.
spacemacs:$XDG_CONFIG_HOME/spacemacs/local-themes.el.@theme:dotspacemacs-themes ':(spacemacs-light spacemacs-dark):(spacemacs-dark spacemacs-light)
# Ranger
ranger:$XDG_CONFIG_HOME/ranger/local-theme.conf.@theme:^set colorscheme :solarized:default
# cht.sh, useless
# chtsh:$XDG_CONFIG_HOME/chtsh/conf.@theme:^style=:vs:native
# BAT
bat:$XDG_CONFIG_HOME/bat/local-theme.sh.@theme:BAT_THEME=:\"OneHalfLight\":\"OneHalfDark\"
